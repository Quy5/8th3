<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng ngày 8/3 - International Women's Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="petals-container" id="petals"></div>

    <main class="container">
        <header>
            <h1>Happy Women's Day</h1>
            <p class="subtitle">DÀNH TẶNG NHỮNG ĐIỀU TUYỆT VỜI NHẤT</p>
        </header>

        <section class="gift-area">
            <div class="gift-scene" id="giftBoxTrigger">
                <div class="gift-box" id="box">
                    <div class="box-face face-front"></div>
                    <div class="box-face face-back"></div>
                    <div class="box-face face-right"></div>
                    <div class="box-face face-left"></div>
                    <div class="box-face face-top"></div>
                    <div class="box-face face-bottom"></div>
                </div>
            </div>
            <p style="margin-top: 2rem; color: #B76E79; font-style: italic;">Chạm vào hộp quà để mở...</p>
        </section>
    </main>

    <div id="reveal-section">
        <div id="puzzle-container"></div>
        <div class="message" id="typing-text"></div>
        <button id="closeBtn"
            style="margin-top: 2rem; padding: 0.8rem 2rem; background: #B76E79; color: white; border: none; border-radius: 50px; cursor: pointer; font-family: inherit;">Trở
            lại</button>
    </div>

    <audio id="bg-music" loop autoplay preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>

</html>
